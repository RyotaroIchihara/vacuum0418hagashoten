<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>申込完了 | 4.18バキューム体験会 in 芳賀書店</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="page-shell">
        <div class="topbar">
          <div class="brand">reservation complete</div>
          <button class="menu-toggle" type="button" aria-expanded="false" aria-label="メニューを開く" data-menu-toggle>
            <span class="menu-toggle-line" aria-hidden="true"></span>
            <span class="menu-toggle-line" aria-hidden="true"></span>
            <span class="menu-toggle-line" aria-hidden="true"></span>
          </button>
          <nav class="topnav" aria-label="主要ナビゲーション">
            <a href="../">トップへ戻る</a>
            <a href="../reserve/">別の枠を見る</a>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="page-shell">
          <div class="summary-card" data-thanks-card>
            <div class="section-head">
              <div>
                <p class="eyebrow">Thanks</p>
                <h1 class="section-title display-title" data-thanks-title>予約を受け付けました</h1>
              </div>
              <p data-thanks-copy>
                この端末内に予約情報を保存しました。実運用ではこの内容をSupabaseなどへ送信する想定です。
              </p>
            </div>

            <ul class="summary-list">
              <li><span>お名前</span><span data-name>-</span></li>
              <li><span>メールアドレス</span><span data-email>-</span></li>
              <li><span>予約枠</span><span data-slot>-</span></li>
              <li><span>参加スタイル</span><span data-experience>-</span></li>
              <li><span>申込時刻</span><span data-created-at>-</span></li>
              <li><span>該当枠の残数</span><span data-remaining>-</span></li>
            </ul>

            <div class="stack-actions">
              <a class="button" href="../">トップページへ戻る</a>
              <a class="button-secondary" href="../admin/export/csv/">予約一覧を見る</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="page-shell">
        <div class="footer-panel">
          <span>当日はスタッフ案内に従ってご参加ください。</span>
          <span><a href="../policy/">注意事項を再確認</a></span>
        </div>
      </div>
    </footer>
  </body>
</html>
