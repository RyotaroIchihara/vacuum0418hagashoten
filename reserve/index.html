<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>予約フォーム | 4.18バキューム体験会 in 芳賀書店</title>
    <meta
      name="description"
      content="4.18バキューム体験会 in 芳賀書店の体験予約フォーム。空き枠確認と同意チェックができます。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="page-shell">
        <div class="topbar">
          <div class="brand">reservation form</div>
          <button class="menu-toggle" type="button" aria-expanded="false" aria-label="メニューを開く" data-menu-toggle>
            <span class="menu-toggle-line" aria-hidden="true"></span>
            <span class="menu-toggle-line" aria-hidden="true"></span>
            <span class="menu-toggle-line" aria-hidden="true"></span>
          </button>
          <nav class="topnav" aria-label="主要ナビゲーション">
            <a href="/">トップへ戻る</a>
            <a href="/policy/">注意事項</a>
            <a href="/admin/">管理者</a>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="page-shell">
          <div class="form-shell">
            <div class="section-head">
              <div>
                <p class="eyebrow">Reservation Form</p>
                <h1 class="section-title display-title">体験枠の予約</h1>
              </div>
              <p>名前はニックネーム可。枠は1回につき1枠のみ、同一メールで同じ枠の重複予約はできません。</p>
            </div>

            <form class="form-grid" data-reserve-form>
              <div class="field">
                <label for="name">お名前（ニックネーム可）</label>
                <input id="name" name="name" type="text" required maxlength="40" />
              </div>

              <div class="field">
                <label for="email">メールアドレス</label>
                <input id="email" name="email" type="email" required />
                <small>予約確認用です。ローカル実装のため、この端末にのみ保存されます。</small>
              </div>

              <div class="field">
                <label for="slot_time">希望時間枠</label>
                <select id="slot_time" name="slot_time" required></select>
                <small class="form-hint" data-slot-hint>空き枠を選択すると残数を表示します。</small>
              </div>

              <div class="field">
                <label for="experience">参加スタイル</label>
                <select id="experience" name="experience" required>
                  <option value="yes">体験希望あり</option>
                  <option value="no">見学のみ</option>
                </select>
              </div>

              <fieldset class="checkgroup">
                <legend>同意チェック（必須）</legend>
                <label class="checkrow">
                  <input type="checkbox" required />
                  <span>参加条件を読み、18歳以上かつ健康状態に問題がないことを確認しました。</span>
                </label>
                <label class="checkrow">
                  <input type="checkbox" required />
                  <span>体験条件を読み、体重・身長・年齢・健康条件を満たすことを確認しました。</span>
                </label>
                <label class="checkrow">
                  <input type="checkbox" required />
                  <span>注意事項、安全規定、スタッフ指示に従うことに同意します。</span>
                </label>
              </fieldset>

              <div class="message is-error" data-form-message hidden></div>

              <div class="stack-actions">
                <button class="button" type="submit">この内容で予約する</button>
                <a class="button-secondary" href="/policy/">同意事項を確認する</a>
              </div>
            </form>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="page-shell">
          <div class="content-panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">Live Slots</p>
                <h2 class="section-title display-title">現在の空き枠</h2>
              </div>
              <p>この端末内の予約データをもとに自動更新されます。</p>
            </div>
            <div class="slot-grid" data-slot-list></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="page-shell">
        <div class="footer-panel">
          <span>本実装では予約データはブラウザの `localStorage` に保存されます。</span>
          <span><a href="/api/reserve/">API仕様メモ</a></span>
        </div>
      </div>
    </footer>
  </body>
</html>
